<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="base::layout(~{::section})">
<head>
<meta charset="UTF-8" />
<title>Home page</title>
</head>
<body>
	<section>
		<div class="container">
			<div class="row">
				<div class="col-md-8 offset-md-2">
					<div class="my-card mt-1">
					
					    <div th:if="${session.message}" th:classappend="${session.message.type}" class="alert" role="alert">
                         <p class="text-center" th:text="${session.message.content}"></p>
                          <th:block th:text="${@sessionHelper.removeMessageFromSession()}"></th:block>
                        </div>
					<div class="container text-center">
					<img style="width:80px;" src="" th:src="@{/image/membership.png}"alt="">
						</div>
						<h1 class="text-center">Register Here!!</h1>
						<!--form   -->
						
						<form novalidate action="" th:action="@{/do_register}" method="post" th:object="${user}">
						 <!-- name field --> 
						  
						  <div class="mb-3">
    <label for="name_field"> Your Name</label>
    <input type="text"
    name="name"
     class="form-control"
     th:classappend="${#fields.hasErrors('name')? 'is-invalid':''}" 
     id="name_field" 
     aria-describedby="emailHelp"
     placeholder="Enter here"
     required="required"
     th:value="${user.name}"
       />
    <div class="invalid-feedback" th:each="error : ${#fields.errors('name')}" th:text="${error}">
</div>
  </div>
  						 <!-- email field --> 
						  
						  <div class="mb-3">
    <label for="email_field"> Your Email</label>
    <input
    name="email" 
    type="email"
     class="form-control" 
     th:classappend="${#fields.hasErrors('email')? 'is-invalid':''}" 
     id="email_field" 
     aria-describedby="emailHelp"
     placeholder="Enter here"
     required="required"
      th:value="${user.email}"
       />
        <div class="invalid-feedback" th:each="error : ${#fields.errors('email')}" th:text="${error}">
</div>
  </div>
              						 <!-- password field --> 
						  
						  <div class="mb-3">
    <label for="password_field"> Your Password</label>
    <input 
    name="password"
    type="password"
     class="form-control" 
     id="password_field" 
     aria-describedby="emailHelp"
     placeholder="Enter here"
     required="required"
      
       />
    
  </div>
             <!--about field  -->
             
             <div class="form-gorup">
             <textarea name="about" th:value="${user.about}" placeholder="Enter something yourself" rows="6" class="form-control"></textarea>
             </div>
             <div class="form-group form-check">
             <input type="checkbox"
             name="agreement"
             class="form-check-input"
             id="agreement"
             />
             <label for="agreement">Accept terms and conditions</label>
             	</div>
             <br>
   <div class="container text-center">
   <button type="submit" class="btn bg-primary  text-white"> 
       Submit
       </button>
       
       <button type="reset" class="btn btn-warning"> 
       Reset
       </button>
   
  </div>
  
  
						
						 </form>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
