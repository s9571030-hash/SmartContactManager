<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="normal/base::layout(~{::section})"
>
<head>
	<meta charset="UTF-8" />
	<title>Home page</title>
</head>
<body>
<section>
<div class="card mr-3 ml-3">

     <div class="card-body" th:if="${contact}">
     
      
      <div class="container text-center">
      
<img  class= "my_profile_picture" alt="profile_photo" src="" style="width: 200px;height: 200px;" th:src="@{'/image/'+${contact.image}}">
 
 <h3 th:text="${contact.name}">   </h3>

         <!--    Starting table from Here    -->
         <table class="table">
  <thead>
    <tr>
      <th scope="col">#Id</th>
      <th scope="col">SCM2020<span th:text="${contact.cid}"></span></th>
      
    </tr>
  </thead>
  <tbody>
    <tr>
      <th scope="row">Email</th>
      <td><span th:text="${contact.email}"></span></td>
      
    </tr>
      <tr>
      <th scope="row">Work</th>
      <td><span th:text="${contact.work}"></span></td>
      
    </tr>
    
    <tr>
      <th scope="row">Phone</th>
      <td><span th:text="${contact.phone}"></span></td>
      
    </tr>
  </tbody>
 </table>
<div class="description mt-3">

<th:block th:utext="${contact.description}"></th:block>

</div>
<div class="container mt-3">

<button th:onclick="|deleteContact(${contact.cid})|" class="btn btn-danger btn-sm"> Delete</button>

<form method="post" th:action="@{'/user/update-contact/'+${contact.cid}}" class="mt-2">
							
			<button type="submit" class="btn btn-primary btn-sm"> Update</button>
							
							</form>

</div>
</div>

</div>
<h1 class="text-center p-3 bg-danger text-white" th:unless="${contact}">You Don!t have permission to see this contact</h1>
</div>
	
	</section>
</body>
</html>
