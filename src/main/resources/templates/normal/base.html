<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">This is base page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  
  </head>
  <body>
    <!-- navbar -->
    <nav class=" fixed-top navbar navbar-expand-lg navbar-dark bg-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Smart Contact Manager</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 text-uppercase">
        <li class="nav-item">
          <a class="nav-link active" th:href="@{/}" aria-current="page" href="#">Home</a>
        </li>
        
       
       
        <li class="nav-item">
          <a class="nav-link "  aria-disabled="true"><span th:text="${user.name}"></span></a>
        </li>
         <li class="nav-item">
          <a class="nav-link " th:href="@{/logout}" aria-disabled="true">Logout</a>
        </li>
      </ul>
     
    </div>
  </div>
</nav>
    <!-- this is end of  navbar -->
    <!-- sidebar -->
    <div class="sidebar mt-3">
    <span onclick="toggleSidebar()" class="crossBtn">&times;</span>
    <a id="home-link" href="#" th:href="@{/user/index}" class="item active"><i class="fa-duotone fa-solid fa-house"></i>Home</a>
    <a id="contacts-link" href="#" th:href="@{/user/show-contacts/0}" class="item"><i class="fa-solid fa-address-card"></i>View Contact</a>
    <a id="add-link" href="#" th:href="@{/user/add-contact}" class="item"><i class="fa-solid fa-pencil"></i>Add Contact</a>
    <a href="#" th:href="@{/user/profile}" class="item"><i class="fa-solid fa-circle-user"></i>Your Profile</a>
    <a id="settings-link" href="#" th:href="@{/user/settings}" class="item"><i class="fa-solid fa-gear"></i>Settings</a>
    <a href="#" th:href="@{/logout}" class="item"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
    <div class="divider"></div>
    </div>
    <!-- end sidebar -->
    
    
    <!-- content aria -->
    <div class="content mt-5">
    <i onclick="toggleSidebar()" class="fas fa-bars m-3"></i>
    <!-- message box  -->
    
    <div th:if="${session.message}" class="container">
      <div th:classappend="${'alert-'+session.message.type}" class="alert text-center" role="alert">
      <span th:text="${session.message.content}"></span>
</div>
<!--  <th:block th:text="${#session.removeAttribute('message')}"></th:block> -->
<th:block th:text="${@sessionHelper.removeMessageFromSession()}"></th:block>
</div>
    <div th:replace="${content}"></div>
  
    </div>
    <!-- end of content aria -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script th:src="@{/js/script.js}"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  
  <script>
  
  function deleteContact(cid) {
    swal({
        title: "Are you sure?",
        text: "You want to delete this contact..",
        icon: "warning",
        buttons: true,
        dangerMode: true,
    })
    .then((willDelete) => {
        if (willDelete) {
            // Agar user 'OK' click karta hai toh is URL par redirect hoga
            window.location = "/user/delete/" + cid;
        } else {
            // Agar user 'Cancel' karta hai
            swal("Your contact is safe !!");
        }
    });
}
  
  </script>
  </body>
</html>
