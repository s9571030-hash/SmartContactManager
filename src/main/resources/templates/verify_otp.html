<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="base::layout(~{::section})">
<head>
<meta charset="UTF-8" />
<title>Home page</title>
</head>
<body>
	<section>
		    <div id="login">
    
        <div class="container">
            <div id="login-row" class="row justify-content-center align-items-center">
                <div id="login-column" class="col-md-6">
                    <div id="login-box" style="height:240px;" class="col-md-12">
                    <!-- email form -->
                        <div class="alert alert-success" role ="alert">
                        We have sent otp successfully to your email..
                        </div>
                        
                        <form action="" th:action="@{/send-otp}" method="post">
                        
                        <div class="form-group">
                        <input name="otp" required="required" type="number" placeholder="Enter OTP here" class="form-control"/>
                        
                        
                        </div>
                        <div class="container text-center">
                        
                        <button class="btn btn-success m-2">Verify</button>
                        </div>
                        
                        </form>
                        
                        
                        
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
	</section>
</body>
</html>
